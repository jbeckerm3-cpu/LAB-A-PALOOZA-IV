<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAB-A-PALOOZA IV</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg, #dff6ff 0%, #e9fff1 100%);
color:#111;
text-align:center;
padding:24px;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
font-size:2.4rem;
letter-spacing:.04em;
}

.subtitle{
font-size:1.1rem;
margin-bottom:20px;
}

.video-box{
position:relative;
width:100%;
padding-top:56.25%;
margin-top:20px;
border-radius:12px;
overflow:hidden;
}

.video-box iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:25px;
}

.time{
background:#111;
color:white;
border-radius:12px;
padding:18px 10px;
}

.time-number{
font-size:2rem;
font-weight:bold;
}

.time-label{
font-size:.8rem;
opacity:.8;
letter-spacing:.05em;
text-transform:uppercase;
}

.details{
margin-top:28px;
line-height:1.6;
font-size:.98rem;
color:#444;
}

</style>
</head>

<body>

<div class="container">

<h1>LAB-A-PALOOZA IV</h1>

<div class="subtitle">
Saturday, April 18 • 2:00 PM<br>
Hosted by Buster
</div>

<div class="video-box">
<iframe
src="https://player.vimeo.com/video/1171513583"
allow="autoplay; fullscreen; picture-in-picture"
allowfullscreen>
</iframe>
</div>

<h2>Countdown to Lab-a-Palooza</h2>

<div class="countdown">
<div class="time">
<div class="time-number" id="days">0</div>
<div class="time-label">Days</div>
</div>

<div class="time">
<div class="time-number" id="hours">0</div>
<div class="time-label">Hours</div>
</div>

<div class="time">
<div class="time-number" id="minutes">0</div>
<div class="time-label">Minutes</div>
</div>

<div class="time">
<div class="time-number" id="seconds">0</div>
<div class="time-label">Seconds</div>
</div>
</div>

<div class="details">
<strong>Prospect Park</strong><br>
95 Prospect Park W<br>
Brooklyn, NY
</div>

</div>

<script>
const partyDate = new Date("2026-04-18T14:00:00");

function updateCountdown(){
  const now = new Date();
  const diff = partyDate - now;

  if(diff <= 0){
    document.getElementById("days").textContent = 0;
    document.getElementById("hours").textContent = 0;
    document.getElementById("minutes").textContent = 0;
    document.getElementById("seconds").textContent = 0;
    return;
  }

  const days = Math.floor(diff/(1000*60*60*24));
  const hours = Math.floor((diff/(1000*60*60))%24);
  const minutes = Math.floor((diff/(1000*60))%60);
  const seconds = Math.floor((diff/1000)%60);

  document.getElementById("days").textContent = days;
  document.getElementById("hours").textContent = hours;
  document.getElementById("minutes").textContent = minutes;
  document.getElementById("seconds").textContent = seconds;
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
